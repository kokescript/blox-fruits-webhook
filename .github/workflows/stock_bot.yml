name: BloxFruits Stock Bot

on:
  schedule:
    # 4時間ごと（世界標準時の0, 4, 8, 12, 16, 20時）に自動実行
    - cron: '0 */4 * * *'
  workflow_dispatch: # 手動でテスト実行するためのボタンをつける設定

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Pythonの準備
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要なライブラリ(requests)をインストール
      run: pip install requests

    - name: プログラムを実行
      env:
        # DiscordのURLをプログラムに安全に渡す
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
